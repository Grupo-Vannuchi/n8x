name: CI

on:
  pull_request:
  push:
    branches: [Development, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build
    runs-on: ubuntu-latest

    # Prisma queries run during the Next prerender, so the build needs a DB.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: agency
          POSTGRES_PASSWORD: agency
          POSTGRES_DB: agency
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://agency:agency@localhost:5432/agency
      DIRECT_URL: postgresql://agency:agency@localhost:5432/agency
      SESSION_SECRET: ci-session-secret-not-real-change-me-please
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`): the committed lock is generated locally on
      # a different npm version, and `npm ci`'s strict check rejects harmless
      # cross-version transitive drift (e.g. @swc/helpers). install reconciles it.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
